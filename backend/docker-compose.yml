version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: paygrade-postgres
    environment:
      POSTGRES_USER: paygrade
      POSTGRES_PASSWORD: password
      POSTGRES_DB: paygrade
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U paygrade -d paygrade"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: paygrade-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: .
    container_name: paygrade-backend
    environment:
      DATABASE_URL: postgresql://paygrade:password@postgres:5432/paygrade
      REDIS_URL: redis://redis:6379
      NODE_ENV: development
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - .:/app
      - /app/node_modules

volumes:
  postgres_data: